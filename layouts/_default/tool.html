{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 py-10 tool-shell">
  {{ partial "breadcrumb.html" . }}

  <section class="mb-8 rounded-2xl border border-cyan-200 bg-gradient-to-br from-cyan-50 to-white p-6 md:p-8">
    <p class="text-xs font-semibold uppercase tracking-wide text-cyan-700 mb-2">Action Workflow</p>
    <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-3">{{ .Title }}</h1>
    <p class="text-slate-600 max-w-3xl">{{ .Description }}</p>
  </section>

  {{ with .Params.quickLinks }}
  <section class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 mb-10 not-prose reveal-grid">
    {{ range . }}
    <a href="{{ .href }}" class="reveal card-lift block rounded-xl border border-slate-200 bg-white p-5 no-underline">
      <p class="font-semibold text-slate-900 mb-1">{{ .title }}</p>
      <p class="text-sm text-slate-600">{{ .description }}</p>
    </a>
    {{ end }}
  </section>
  {{ end }}

  <article class="prose prose-slate prose-lg max-w-none bg-white rounded-2xl border border-slate-200 p-6 md:p-8">
    {{ .Content }}
  </article>

  {{ partial "faq.html" . }}
</div>
{{ end }}
