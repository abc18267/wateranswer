{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 py-10">
  {{ partial "breadcrumb.html" . }}
  {{ partial "affiliate-disclosure.html" . }}

  {{ with .Params.lastmod }}
  <p class="text-sm text-slate-500 mb-4">Last updated: {{ . | time.Format "January 2, 2006" }}</p>
  {{ end }}

  <article class="prose prose-slate prose-lg max-w-none">
    {{ .Content }}
  </article>

  {{ partial "faq.html" . }}
</div>
{{ end }}
