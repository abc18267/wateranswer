{{ define "main" }}
<div class="max-w-6xl mx-auto px-4 py-10">
  {{ partial "breadcrumb.html" . }}
  {{ partial "affiliate-disclosure.html" . }}

  {{ with .Params.lastmod }}
  <p class="text-sm text-slate-500 mb-4">Last updated: {{ . | time.Format "January 2, 2006" }}</p>
  {{ end }}

  <div class="lg:flex lg:gap-12 lg:items-start">

    <!-- Desktop sidebar TOC -->
    <aside class="hidden lg:block w-52 shrink-0">
      <div id="article-toc" class="sticky top-24 not-prose"></div>
    </aside>

    <!-- Article content -->
    <div class="min-w-0 flex-1">
      <article class="prose prose-slate prose-lg max-w-none">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
      </article>

      {{ partial "faq.html" . }}
    </div>

  </div>
</div>
{{ end }}
