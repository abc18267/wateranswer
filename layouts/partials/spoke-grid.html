{{ with .Params.spokeHeading }}
<h2 class="text-2xl font-bold text-slate-900 mb-6">{{ . }}</h2>
{{ end }}
{{ if .Params.spokeCards }}
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-10 not-prose">
  {{ range .Params.spokeCards }}
  <a
    href="{{ .href }}"
    class="group block rounded-xl border border-slate-200 p-5 hover:border-cyan-300 hover:shadow-md transition-all no-underline bg-white"
  >
    {{ with .badge }}
    <span class="inline-block text-xs font-semibold text-cyan-700 bg-cyan-50 border border-cyan-200 rounded-full px-2 py-0.5 mb-2">
      {{ . }}
    </span>
    {{ end }}
    <p class="font-semibold text-slate-900 group-hover:text-cyan-700 mb-1">{{ .title }}</p>
    <p class="text-sm text-slate-500 leading-snug">{{ .description }}</p>
  </a>
  {{ end }}
</div>
{{ end }}
