<script>

// ── Reading progress bar ─────────────────────────────────────────
(function() {
  var bar = document.getElementById('reading-progress');
  if (!bar) return;
  function update() {
    var scrollTop = window.scrollY || document.documentElement.scrollTop;
    var docH = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    bar.style.width = (docH > 0 ? (scrollTop / docH) * 100 : 0) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
})();

// ── Back to top ──────────────────────────────────────────────────
(function() {
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  function toggle() {
    if (window.scrollY > 320) {
      btn.classList.remove('hidden-btn');
      btn.removeAttribute('aria-hidden');
      btn.removeAttribute('tabindex');
    } else {
      btn.classList.add('hidden-btn');
      btn.setAttribute('aria-hidden', 'true');
      btn.setAttribute('tabindex', '-1');
    }
  }
  window.addEventListener('scroll', toggle, { passive: true });
  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  toggle();
})();

// ── Mobile nav ───────────────────────────────────────────────────
(function() {
  var btn = document.getElementById('mobile-menu-btn');
  var nav = document.getElementById('mobile-nav');
  if (!btn || !nav) return;
  function closeMenu() {
    nav.classList.add('hidden');
    btn.setAttribute('aria-expanded', 'false');
  }
  btn.addEventListener('click', function() {
    var open = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', String(!open));
    nav.classList.toggle('hidden');
  });
  nav.querySelectorAll('a').forEach(function(link) {
    link.addEventListener('click', function() {
      closeMenu();
    });
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeMenu();
  });
})();

// ── More dropdown ────────────────────────────────────────────────
(function() {
  var btn = document.getElementById('more-btn');
  var menu = document.getElementById('more-menu');
  if (!btn || !menu) return;
  function closeMenu() {
    menu.classList.add('hidden');
    btn.setAttribute('aria-expanded', 'false');
  }
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var open = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', String(!open));
    menu.classList.toggle('hidden');
  });
  document.addEventListener('click', function() {
    closeMenu();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeMenu();
  });
})();

// ── Lookup forms (ZIP + address) ────────────────────────────────
(function() {
  function cleanZip(value) {
    return (value || '').replace(/\D/g, '').slice(0, 5);
  }

  function wireZipForm(form, input) {
    var latField = form.querySelector('[data-lat-field]');
    var lonField = form.querySelector('[data-lon-field]');
    form.addEventListener('submit', function(e) {
      var zip = cleanZip(input.value);
      var hasGeo = Boolean(latField && lonField && latField.value && lonField.value);
      if (zip.length !== 5 && !hasGeo) {
        e.preventDefault();
        input.setCustomValidity('Enter a valid 5-digit ZIP code.');
        input.reportValidity();
        return;
      }
      input.setCustomValidity('');
      input.value = zip;
    });
  }

  document.querySelectorAll('[data-zip-form]').forEach(function(form) {
    var input = form.querySelector('[data-zip-input]');
    if (!input) return;
    wireZipForm(form, input);
  });

  function setLocationFields(form, lat, lon) {
    var latField = form.querySelector('[data-lat-field]');
    var lonField = form.querySelector('[data-lon-field]');
    if (latField) latField.value = String(lat);
    if (lonField) lonField.value = String(lon);
  }

  function reverseGeocodeZip(lat, lon) {
    var url = 'https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' + encodeURIComponent(lat) + '&lon=' + encodeURIComponent(lon);
    return fetch(url, { headers: { 'Accept': 'application/json' } })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data || !data.address || !data.address.postcode) return '';
        return cleanZip(data.address.postcode);
      })
      .catch(function() { return ''; });
  }

  function reverseGeocodeDetails(lat, lon) {
    var url = 'https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' + encodeURIComponent(lat) + '&lon=' + encodeURIComponent(lon);
    return fetch(url, { headers: { 'Accept': 'application/json' } })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data || !data.address) return null;
        var a = data.address;
        return {
          zip: cleanZip(a.postcode || ''),
          stateCode: (a['ISO3166-2-lvl4'] || '').replace('US-', ''),
          city: a.city || a.town || a.village || a.county || '',
          lat: lat,
          lon: lon
        };
      })
      .catch(function() { return null; });
  }

  document.querySelectorAll('[data-geo-btn]').forEach(function(btn) {
    var form = btn.closest('form');
    if (!form) return;
    var zipInput = form.querySelector('[data-zip-input]');
    btn.addEventListener('click', function() {
      if (!('geolocation' in navigator)) {
        btn.textContent = 'Location Not Supported';
        return;
      }
      var original = btn.textContent;
      btn.textContent = 'Locating...';
      btn.disabled = true;
      navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude.toFixed(5);
        var lon = pos.coords.longitude.toFixed(5);
        setLocationFields(form, lat, lon);
        reverseGeocodeZip(lat, lon).then(function(zip) {
          if (zipInput && zip.length === 5) {
            zipInput.value = zip;
            zipInput.required = true;
          } else if (zipInput) {
            // Allow geolocation-only submission when reverse ZIP lookup fails.
            zipInput.value = '';
            zipInput.required = false;
          }
          btn.textContent = 'Using Current Location';
          btn.disabled = false;
          form.requestSubmit();
        });
      }, function() {
        btn.textContent = 'Location Blocked';
        btn.disabled = false;
        setTimeout(function() { btn.textContent = original; }, 1800);
      }, { enableHighAccuracy: false, timeout: 9000, maximumAge: 600000 });
    });
  });

  var addressForm = document.querySelector('[data-address-form]');
  var addressInput = addressForm ? addressForm.querySelector('#lookup-address') : null;
  if (addressForm && addressInput) {
    addressForm.addEventListener('submit', function(e) {
      var address = (addressInput.value || '').trim();
      if (!address) {
        e.preventDefault();
        addressInput.setCustomValidity('Enter an address or city.');
        addressInput.reportValidity();
        return;
      }
      addressInput.setCustomValidity('');
    });
  }

  var ctx = document.getElementById('lookup-context');
  var recWrap = document.getElementById('lookup-recommendations');
  var recRegion = document.getElementById('lookup-region-pill');
  var recSummary = document.getElementById('lookup-recommendation-summary');
  var recLinks = document.getElementById('lookup-recommendation-links');
  var lookupResults = document.getElementById('lookup-results');
  var lookupResultsTitle = document.getElementById('lookup-results-title');
  var lookupResultsSummary = document.getElementById('lookup-results-summary');
  var lookupResultsCards = document.getElementById('lookup-results-cards');
  function inferRegion(zip) {
    if (!zip || zip.length !== 5) return null;
    var first = parseInt(zip.charAt(0), 10);
    if (first <= 1) return 'Northeast';
    if (first === 2 || first === 3) return 'Southeast';
    if (first === 4 || first === 5) return 'Midwest';
    if (first === 6 || first === 7) return 'South Central';
    if (first === 8 || first === 9) return 'West';
    return null;
  }

  function recommendationSet(region) {
    var base = [
      { href: '/learn/how-to-read-water-quality-report/', label: 'Read your CCR first', desc: 'Confirm your utility, contaminant levels, and violations.' },
      { href: '/treatment/what-water-filter-do-i-need/', label: 'Choose filter type by contaminant', desc: 'Map contaminant class to the right treatment technology.' }
    ];
    if (region === 'Northeast') {
      return base.concat([
        { href: '/learn/new-england-arsenic-well-water/', label: 'Check arsenic risk patterns', desc: 'Northeast bedrock regions can elevate arsenic in wells.' },
        { href: '/your-water/well-water/well-water-testing-guide/', label: 'Run well-water test workflow', desc: 'Prioritize arsenic, nitrates, bacteria, and pH.' }
      ]);
    }
    if (region === 'Southeast') {
      return base.concat([
        { href: '/learn/florida-drinking-water-quality/', label: 'Review regional city-water issues', desc: 'Disinfection byproducts and infrastructure age can matter.' },
        { href: '/your-water/contaminants/thms/', label: 'Understand disinfection byproducts', desc: 'Use THM context before selecting carbon/RO options.' }
      ]);
    }
    if (region === 'Midwest') {
      return base.concat([
        { href: '/learn/midwest-nitrates-well-water/', label: 'Check nitrate contamination patterns', desc: 'Agricultural regions often need nitrate-focused testing.' },
        { href: '/treatment/how-to-remove-nitrates-from-water/', label: 'Nitrate treatment options', desc: 'Identify when RO or distillation is required.' }
      ]);
    }
    if (region === 'South Central') {
      return base.concat([
        { href: '/learn/texas-drinking-water-quality/', label: 'Review hard-water and THM context', desc: 'Expect hardness plus disinfectant byproduct tradeoffs.' },
        { href: '/treatment/water-softener-vs-reverse-osmosis-hard-water/', label: 'Match hardness solution to goal', desc: 'Separate scale control from drinking-water treatment.' }
      ]);
    }
    if (region === 'West') {
      return base.concat([
        { href: '/learn/california-drinking-water-quality/', label: 'Review chromium-6 and PFAS context', desc: 'Western systems vary widely by source and region.' },
        { href: '/your-water/contaminants/chromium-6/', label: 'Understand chromium-6 risk and action', desc: 'Use treatment paths based on verified tap levels.' }
      ]);
    }
    return base.concat([
      { href: '/testing/how-to-test-water-at-home/', label: 'Start with practical testing', desc: 'Use low-cost screening before advanced lab panels.' },
      { href: '/testing/best-mail-in-water-tests/', label: 'Move to certified lab testing', desc: 'Use mail-in labs for contaminant-specific confirmation.' }
    ]);
  }

  function renderRecommendations(region, addressProvided) {
    if (!recWrap || !recRegion || !recSummary || !recLinks) return;
    recRegion.textContent = region ? ('Inferred region: ' + region) : 'No region inferred';
    recSummary.textContent = region
      ? 'Based on your ZIP, start with these region-aware resources, then validate using your utility CCR and tap testing.'
      : 'Address-only lookups cannot infer region from ZIP. Start with these high-confidence next steps.';
    if (addressProvided && !region) {
      recSummary.textContent = 'Address-only input provided. Start with universal next steps, then confirm your utility and contaminants in your CCR.';
    }
    recLinks.innerHTML = '';
    recommendationSet(region).forEach(function(item) {
      var card = document.createElement('a');
      card.href = item.href;
      card.className = 'block rounded-xl border border-emerald-200 bg-white p-4 no-underline hover:border-emerald-300';
      card.innerHTML =
        '<p class=\"font-semibold text-slate-900 mb-1\">' + item.label + '</p>' +
        '<p class=\"text-sm text-slate-600\">' + item.desc + '</p>';
      recLinks.appendChild(card);
    });
    recWrap.classList.remove('hidden');
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normText(value) {
    return (value || '')
      .toLowerCase()
      .replace(/[\.\,]/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  var utilityIndexPromise = null;
  function loadUtilityIndex() {
    if (!utilityIndexPromise) {
      utilityIndexPromise = fetch('/data/utility-index.json', { headers: { 'Accept': 'application/json' } })
        .then(function(r) { return r.ok ? r.json() : { cityUtilities: [] }; })
        .catch(function() { return { cityUtilities: [] }; });
    }
    return utilityIndexPromise;
  }

  function getUtilityMatches(index, stateCode, city) {
    if (!index || !stateCode) return { confidence: 'low', systems: [], stateAgency: '' };
    var cityNorm = normText(city || '');
    var agency = index.stateDefaults && index.stateDefaults[stateCode] ? index.stateDefaults[stateCode].agency : '';
    if (!index.cityUtilities || !cityNorm) {
      return { confidence: 'modelled', systems: [], stateAgency: agency };
    }
    var exact = index.cityUtilities.filter(function(item) {
      return item.state === stateCode && normText(item.city) === cityNorm;
    });
    if (exact.length) {
      var systems = [];
      exact.forEach(function(item) {
        (item.systems || []).forEach(function(name) { systems.push(name); });
      });
      return { confidence: 'high', systems: Array.from(new Set(systems)).slice(0, 6), stateAgency: agency };
    }
    var partial = index.cityUtilities.filter(function(item) {
      if (item.state !== stateCode) return false;
      var cityItem = normText(item.city);
      return cityNorm.indexOf(cityItem) !== -1 || cityItem.indexOf(cityNorm) !== -1;
    });
    if (partial.length) {
      var pSystems = [];
      partial.forEach(function(item) {
        (item.systems || []).forEach(function(name) { pSystems.push(name); });
      });
      return { confidence: 'medium', systems: Array.from(new Set(pSystems)).slice(0, 6), stateAgency: agency };
    }
    // National fallback: modeled utility candidates for any city/state combination.
    var cityTitle = cityNorm.split(' ').map(function(w) { return w ? (w[0].toUpperCase() + w.slice(1)) : w; }).join(' ');
    var modeled = [];
    if (cityTitle) {
      modeled.push(cityTitle + ' Water Department');
      modeled.push(cityTitle + ' Public Utilities');
      modeled.push(cityTitle + ' Utilities Water Division');
    }
    modeled.push(stateNameFromCode(stateCode) + ' Rural Water District');
    return { confidence: 'modelled', systems: Array.from(new Set(modeled)).slice(0, 5), stateAgency: agency };
  }

  function stateResource(stateCode) {
    var map = {
      CA: '/learn/california-drinking-water-quality/',
      FL: '/learn/florida-drinking-water-quality/',
      TX: '/learn/texas-drinking-water-quality/',
      MI: '/learn/michigan-pfas-water-contamination/',
      NY: '/learn/nyc-tap-water-quality/',
      AZ: '/learn/arizona-hard-water-treatment/'
    };
    return map[stateCode] || '/learn/';
  }

  function priorityByRegion(region) {
    var priorities = {
      Northeast: ['Arsenic', 'Lead', 'Radon'],
      Southeast: ['THMs', 'Lead', 'PFAS'],
      Midwest: ['Nitrates', 'Lead', 'PFAS'],
      'South Central': ['Hardness', 'THMs', 'Lead'],
      West: ['Chromium-6', 'PFAS', 'Hardness']
    };
    return priorities[region] || ['Lead', 'PFAS', 'Nitrates'];
  }

  function stateNameFromCode(code) {
    var names = {
      AL: 'Alabama', AK: 'Alaska', AZ: 'Arizona', AR: 'Arkansas', CA: 'California', CO: 'Colorado', CT: 'Connecticut', DE: 'Delaware',
      FL: 'Florida', GA: 'Georgia', HI: 'Hawaii', ID: 'Idaho', IL: 'Illinois', IN: 'Indiana', IA: 'Iowa', KS: 'Kansas', KY: 'Kentucky',
      LA: 'Louisiana', ME: 'Maine', MD: 'Maryland', MA: 'Massachusetts', MI: 'Michigan', MN: 'Minnesota', MS: 'Mississippi', MO: 'Missouri',
      MT: 'Montana', NE: 'Nebraska', NV: 'Nevada', NH: 'New Hampshire', NJ: 'New Jersey', NM: 'New Mexico', NY: 'New York', NC: 'North Carolina',
      ND: 'North Dakota', OH: 'Ohio', OK: 'Oklahoma', OR: 'Oregon', PA: 'Pennsylvania', RI: 'Rhode Island', SC: 'South Carolina',
      SD: 'South Dakota', TN: 'Tennessee', TX: 'Texas', UT: 'Utah', VT: 'Vermont', VA: 'Virginia', WA: 'Washington', WV: 'West Virginia',
      WI: 'Wisconsin', WY: 'Wyoming', DC: 'District of Columbia'
    };
    return names[code] || '';
  }

  function stateRegionFromCode(code) {
    var groups = {
      Northeast: ['CT', 'ME', 'MA', 'NH', 'RI', 'VT', 'NJ', 'NY', 'PA'],
      Southeast: ['AL', 'AR', 'DE', 'DC', 'FL', 'GA', 'KY', 'LA', 'MD', 'MS', 'NC', 'SC', 'TN', 'VA', 'WV'],
      Midwest: ['IL', 'IN', 'IA', 'KS', 'MI', 'MN', 'MO', 'NE', 'ND', 'OH', 'OK', 'SD', 'WI'],
      'South Central': ['AZ', 'NM', 'TX', 'CO', 'UT', 'NV'],
      West: ['AK', 'CA', 'HI', 'ID', 'MT', 'OR', 'WA', 'WY']
    };
    var region = null;
    Object.keys(groups).forEach(function(key) {
      if (!region && groups[key].indexOf(code) !== -1) region = key;
    });
    return region || null;
  }

  function statePriorityByCode(code, fallbackRegion) {
    var specific = {
      CA: ['Chromium-6', 'PFAS', 'Arsenic'],
      FL: ['THMs', 'Lead', 'PFAS'],
      TX: ['Hardness', 'THMs', 'Lead'],
      MI: ['PFAS', 'Lead', 'Nitrates'],
      NY: ['Lead', 'THMs', 'PFAS'],
      AZ: ['Hardness', 'Arsenic', 'Chromium-6']
    };
    return specific[code] || priorityByRegion(fallbackRegion);
  }

  function buildZipResourceCards(result, priorities, utilityMatch) {
    var zip = result.zip || '';
    var stateCode = result.stateCode || '';
    var stateName = stateNameFromCode(stateCode);
    var stateGuide = stateResource(stateCode);
    var stateQuery = encodeURIComponent((stateName || stateCode || 'state') + ' drinking water consumer confidence report');
    var utilitySearch = encodeURIComponent((result.city || result.cityState || 'city') + ' ' + (stateName || stateCode || '') + ' water utility consumer confidence report');
    var utilityCardHtml;
    if (utilityMatch && utilityMatch.systems && utilityMatch.systems.length) {
      var utilRows = utilityMatch.systems.map(function(name) {
        var q = encodeURIComponent(name + ' consumer confidence report');
        return '<li><a class="text-cyan-700 no-underline hover:underline" target="_blank" rel="noopener noreferrer" href="https://www.google.com/search?q=' + q + '">' + escapeHtml(name) + '</a></li>';
      }).join('');
      utilityCardHtml =
        '<div class="rounded-lg border border-slate-200 p-3">' +
        '<p class="font-semibold text-slate-900 mb-1">Likely systems (' + escapeHtml(utilityMatch.confidence) + ' confidence)</p>' +
        '<ul class="text-sm text-slate-600 list-disc pl-5 space-y-1">' + utilRows + '</ul>' +
        (utilityMatch.stateAgency
          ? ('<p class="text-xs text-slate-500 mt-2">State program: ' + escapeHtml(utilityMatch.stateAgency) + '</p>')
          : '') +
        '</div>';
    } else {
      utilityCardHtml =
        '<div class="rounded-lg border border-slate-200 p-3">' +
        '<p class="font-semibold text-slate-900 mb-1">Utility candidates</p>' +
        '<p class="text-sm text-slate-600 mb-2">No direct system match in local index for this ZIP yet.</p>' +
        '<a class="text-sm text-cyan-700 no-underline hover:underline" target="_blank" rel="noopener noreferrer" href="https://www.google.com/search?q=' + utilitySearch + '">Search city utility + CCR</a>' +
        (utilityMatch && utilityMatch.stateAgency
          ? ('<p class="text-xs text-slate-500 mt-2">State program: ' + escapeHtml(utilityMatch.stateAgency) + '</p>')
          : '') +
        '</div>';
    }

    var cards = [
      {
        title: 'State guide',
        text: stateName ? ('Use the ' + stateName + ' regional guide first.') : 'Open regional guide for likely risk patterns.',
        href: stateGuide,
        label: 'Open state guide'
      },
      {
        title: 'EWG ZIP lookup',
        text: zip ? ('Run ZIP ' + zip + ' through EWG utility data.') : 'Run your ZIP in EWG tap water database.',
        href: zip ? ('https://www.ewg.org/tapwater/search-results.php?zip5=' + zip) : 'https://www.ewg.org/tapwater/',
        label: 'Open EWG lookup'
      },
      {
        title: 'EPA CCR resources',
        text: 'Confirm official utility report and annual compliance context.',
        href: 'https://www.epa.gov/ccr',
        label: 'Open EPA CCR'
      },
      {
        title: 'State agency search',
        text: 'Find your state drinking-water office and local utility reporting.',
        href: 'https://www.google.com/search?q=' + stateQuery,
        label: 'Search state resources'
      },
      {
        title: 'Treatment matching',
        text: 'Map priority contaminants to treatment mechanisms.',
        href: '/tools/contaminant-treatment-matrix/',
        label: 'Open treatment matrix'
      },
      {
        title: 'Certification validation',
        text: 'Verify specific model claims before buying.',
        href: '/tools/nsf-certification-checker/',
        label: 'Open NSF checker'
      }
    ];
    var cardsHtml = cards.map(function(card) {
      return '<div class="rounded-lg border border-slate-200 p-3">' +
        '<p class="font-semibold text-slate-900 mb-1">' + escapeHtml(card.title) + '</p>' +
        '<p class="text-sm text-slate-600 mb-2">' + escapeHtml(card.text) + '</p>' +
        '<a class="text-sm text-cyan-700 no-underline hover:underline" href="' + card.href + '" target="' + (card.href.indexOf('http') === 0 ? '_blank' : '_self') + '" rel="' + (card.href.indexOf('http') === 0 ? 'noopener noreferrer' : '') + '">' + escapeHtml(card.label) + '</a>' +
        '</div>';
    }).join('');
    return utilityCardHtml + cardsHtml;
  }

  function estimateSystem(zip, address) {
    var text = (address || '').toLowerCase();
    if (text.indexOf('well') !== -1 || text.indexOf('rural route') !== -1 || text.indexOf('county road') !== -1) {
      return 'Likely private well context';
    }
    if (zip && zip.length === 5) {
      var first = parseInt(zip.charAt(0), 10);
      if (first >= 0 && first <= 2) return 'Likely municipal utility system';
      if (first >= 8) return 'Likely municipal utility with regional variability';
    }
    return 'Likely municipal utility system';
  }

  function renderLookupResult(result) {
    if (!lookupResults || !lookupResultsTitle || !lookupResultsSummary || !lookupResultsCards) return;
    var locationLabel = result.cityState || result.zip || result.address || 'your area';
    lookupResultsTitle.textContent = 'Estimated utility context for ' + locationLabel;
    lookupResultsSummary.textContent =
      'This is a screening estimate. Confirm utility name and contaminant levels in your latest CCR before treatment decisions.';
    var region = result.region || stateRegionFromCode(result.stateCode || '');
    var priorities = statePriorityByCode(result.stateCode || '', region);
    var system = estimateSystem(result.zip, result.address);
    lookupResultsCards.innerHTML =
      '<div class="rounded-lg border border-slate-200 p-3">' +
      '<p class="font-semibold text-slate-900 mb-1">System estimate</p>' +
      '<p class="text-sm text-slate-600">' + escapeHtml(system) + '</p>' +
      '</div>' +
      '<div class="rounded-lg border border-slate-200 p-3">' +
      '<p class="font-semibold text-slate-900 mb-1">Priority contaminants</p>' +
      '<p class="text-sm text-slate-600">' + escapeHtml(priorities.join(', ')) + '</p>' +
      '</div>' +
      '<div class="rounded-lg border border-slate-200 p-3">' +
      '<p class="font-semibold text-slate-900 mb-1">Next source to open</p>' +
      '<a class="text-sm text-cyan-700 no-underline hover:underline" href="' + stateResource(result.stateCode) + '">Regional water guide</a>' +
      '</div>' +
      '<div class="rounded-lg border border-slate-200 p-3">' +
      '<p class="font-semibold text-slate-900 mb-1">Validation path</p>' +
      '<a class="text-sm text-cyan-700 no-underline hover:underline" href="/learn/how-to-read-water-quality-report/">Read CCR and confirm utility</a>' +
      '</div>' +
      '<div class="rounded-lg border border-slate-200 p-3">' +
      '<p class="font-semibold text-slate-900 mb-1">Loading ZIP resources</p>' +
      '<p class="text-sm text-slate-600">Resolving utility candidates and state resources...</p>' +
      '</div>';
    lookupResults.classList.remove('hidden');
    loadUtilityIndex().then(function(index) {
      var match = getUtilityMatches(index, result.stateCode || '', result.city || result.cityState || '');
      lookupResultsCards.innerHTML =
        '<div class="rounded-lg border border-slate-200 p-3">' +
        '<p class="font-semibold text-slate-900 mb-1">System estimate</p>' +
        '<p class="text-sm text-slate-600">' + escapeHtml(system) + '</p>' +
        '</div>' +
        '<div class="rounded-lg border border-slate-200 p-3">' +
        '<p class="font-semibold text-slate-900 mb-1">Priority contaminants</p>' +
        '<p class="text-sm text-slate-600">' + escapeHtml(priorities.join(', ')) + '</p>' +
        '</div>' +
        buildZipResourceCards(result, priorities, match);
    });
  }

  function lookupZipDetails(zip) {
    var url = 'https://api.zippopotam.us/us/' + encodeURIComponent(zip);
    return fetch(url, { headers: { 'Accept': 'application/json' } })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data || !data.places || !data.places[0]) return null;
        var place = data.places[0];
        return {
          zip: zip,
          city: place['place name'] || '',
          stateCode: place['state abbreviation'] || '',
          cityState: (place['place name'] || '') + ', ' + (place['state abbreviation'] || ''),
          region: stateRegionFromCode(place['state abbreviation'] || '')
        };
      })
      .catch(function() { return null; });
  }

  function geocodeAddress(address) {
    var url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&countrycodes=us&limit=1&q=' + encodeURIComponent(address);
    return fetch(url, { headers: { 'Accept': 'application/json' } })
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(function(data) {
        if (!data || !data.length) return null;
        var hit = data[0];
        return reverseGeocodeDetails(hit.lat, hit.lon).then(function(details) {
          return {
            address: address,
            zip: details && details.zip ? details.zip : '',
            stateCode: details && details.stateCode ? details.stateCode : '',
            cityState: hit.display_name ? hit.display_name.split(',').slice(0, 2).join(',') : address,
            lat: hit.lat,
            lon: hit.lon,
            region: details ? stateRegionFromCode(details.stateCode || '') : null
          };
        });
      })
      .catch(function() { return null; });
  }

  if (ctx) {
    var params = new URLSearchParams(window.location.search);
    var zip = cleanZip(params.get('zip') || '');
    var address = (params.get('address') || '').trim();
    var lat = (params.get('lat') || '').trim();
    var lon = (params.get('lon') || '').trim();
    var parts = [];
    if (zip) parts.push('ZIP ' + zip);
    if (address) parts.push('address "' + address + '"');
    if (!zip && lat && lon) parts.push('current location (' + lat + ', ' + lon + ')');
    if (parts.length) {
      ctx.textContent = 'Showing resources for ' + parts.join(' and ') + '.';
      ctx.classList.remove('hidden');
      var region = inferRegion(zip);
      renderRecommendations(region, Boolean(address));
      if (zip) {
        lookupZipDetails(zip).then(function(res) {
          var result = res || { zip: zip, cityState: 'ZIP ' + zip, stateCode: '', address: address, region: region };
          if (!result.region) result.region = inferRegion(zip);
          if (address && !result.address) result.address = address;
          renderLookupResult(result);
        });
      } else if (address) {
        geocodeAddress(address).then(function(res) {
          var result = res || { address: address, zip: '', cityState: address, stateCode: '', region: null };
          result.region = inferRegion(result.zip || '');
          renderLookupResult(result);
        });
      } else if (lat && lon) {
        reverseGeocodeDetails(lat, lon).then(function(details) {
          var geoZip = details && details.zip ? details.zip : '';
          var inferred = details && details.stateCode ? stateRegionFromCode(details.stateCode) : inferRegion(geoZip);
          renderLookupResult({
            zip: geoZip,
            cityState: details && details.city ? (details.city + (details.stateCode ? ', ' + details.stateCode : '')) : 'Current location',
            stateCode: details && details.stateCode ? details.stateCode : '',
            region: inferred
          });
        });
      }
    }
  }
})();

// ── Water Quality Browser tool ───────────────────────────────────
(function() {
  var stateSelect = document.getElementById('wb-state');
  var citySelect = document.getElementById('wb-city');
  var systemSelect = document.getElementById('wb-system');
  var contamSelect = document.getElementById('wb-contaminant');
  var result = document.getElementById('wb-result');
  if (!stateSelect || !citySelect || !systemSelect || !contamSelect || !result) return;

  var data = {
    California: {
      guide: '/learn/california-drinking-water-quality/',
      cities: {
        'Los Angeles Area': { system: 'Large municipal blend', contaminants: ['PFAS', 'Chromium-6', 'Lead'] },
        'Central Valley': { system: 'Groundwater-heavy systems', contaminants: ['Nitrates', 'Arsenic', 'Chromium-6'] }
      }
    },
    Texas: {
      guide: '/learn/texas-drinking-water-quality/',
      cities: {
        'Houston Area': { system: 'Surface water + disinfection', contaminants: ['THMs', 'Lead', 'PFAS'] },
        'Dallas/Fort Worth': { system: 'Mixed utility sources', contaminants: ['Hardness', 'THMs', 'Lead'] }
      }
    },
    Florida: {
      guide: '/learn/florida-drinking-water-quality/',
      cities: {
        'South Florida': { system: 'Groundwater utility systems', contaminants: ['THMs', 'PFAS', 'Lead'] },
        'Central Florida': { system: 'Municipal distribution systems', contaminants: ['Hardness', 'THMs', 'Nitrates'] }
      }
    },
    Michigan: {
      guide: '/learn/michigan-pfas-water-contamination/',
      cities: {
        'Metro Detroit': { system: 'Legacy infrastructure systems', contaminants: ['Lead', 'PFAS', 'THMs'] },
        'West Michigan': { system: 'Regional utility mix', contaminants: ['PFAS', 'Nitrates', 'Lead'] }
      }
    }
  };

  var contaminantLinks = {
    PFAS: '/your-water/contaminants/pfas/',
    Lead: '/your-water/contaminants/lead/',
    Nitrates: '/your-water/contaminants/nitrates/',
    Arsenic: '/your-water/contaminants/arsenic/',
    'Chromium-6': '/your-water/contaminants/chromium-6/',
    THMs: '/your-water/contaminants/thms/',
    Hardness: '/your-water/contaminants/hard-water/'
  };

  Object.keys(data).sort().forEach(function(state) {
    var opt = document.createElement('option');
    opt.value = state;
    opt.textContent = state;
    stateSelect.appendChild(opt);
  });

  function resetSelect(sel, text) {
    sel.innerHTML = '';
    var opt = document.createElement('option');
    opt.value = '';
    opt.textContent = text;
    sel.appendChild(opt);
  }

  stateSelect.addEventListener('change', function() {
    resetSelect(citySelect, 'Select city/region');
    resetSelect(systemSelect, 'Select system context');
    resetSelect(contamSelect, 'Select contaminant');
    citySelect.disabled = true;
    systemSelect.disabled = true;
    contamSelect.disabled = true;
    result.classList.add('hidden');
    var st = stateSelect.value;
    if (!st || !data[st]) return;
    Object.keys(data[st].cities).forEach(function(city) {
      var opt = document.createElement('option');
      opt.value = city;
      opt.textContent = city;
      citySelect.appendChild(opt);
    });
    citySelect.disabled = false;
  });

  citySelect.addEventListener('change', function() {
    resetSelect(systemSelect, 'Select system context');
    resetSelect(contamSelect, 'Select contaminant');
    systemSelect.disabled = true;
    contamSelect.disabled = true;
    result.classList.add('hidden');
    var st = stateSelect.value;
    var city = citySelect.value;
    if (!st || !city || !data[st] || !data[st].cities[city]) return;
    var sys = data[st].cities[city].system;
    var sysOpt = document.createElement('option');
    sysOpt.value = sys;
    sysOpt.textContent = sys;
    systemSelect.appendChild(sysOpt);
    systemSelect.disabled = false;
    data[st].cities[city].contaminants.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      contamSelect.appendChild(opt);
    });
    contamSelect.disabled = false;
  });

  function renderBrowserResult() {
    var st = stateSelect.value;
    var city = citySelect.value;
    var sys = systemSelect.value;
    var contam = contamSelect.value;
    if (!st || !city || !sys || !contam) return;
    var link = contaminantLinks[contam] || '/your-water/';
    var guide = data[st].guide;
    result.innerHTML =
      '<p class="font-semibold mb-1">Recommended path for ' + escapeHtml(city) + ', ' + escapeHtml(st) + '</p>' +
      '<p class="mb-2">System context: ' + escapeHtml(sys) + '. Prioritize <strong>' + escapeHtml(contam) + '</strong> validation first.</p>' +
      '<p><a class="text-cyan-700 no-underline hover:underline" href="' + guide + '">Open regional guide</a> | ' +
      '<a class="text-cyan-700 no-underline hover:underline" href="' + link + '">Open contaminant hub</a></p>';
    result.classList.remove('hidden');
  }

  systemSelect.addEventListener('change', renderBrowserResult);
  contamSelect.addEventListener('change', renderBrowserResult);
})();

// ── Well action plan tool ───────────────────────────────────────
(function() {
  var wrap = document.getElementById('well-action-tool');
  var button = document.getElementById('well-action-generate');
  var result = document.getElementById('well-action-result');
  var urgency = document.getElementById('well-action-urgency');
  var steps = document.getElementById('well-action-steps');
  if (!wrap || !button || !result || !urgency || !steps) return;

  var weight = { annual: 1, flood: 3, repair: 2, taste: 2, infant: 2, known: 3 };
  button.addEventListener('click', function() {
    var checked = Array.prototype.slice.call(wrap.querySelectorAll('input[type="checkbox"]:checked')).map(function(el) { return el.value; });
    var score = checked.reduce(function(total, v) { return total + (weight[v] || 0); }, 0);
    var level = 'Routine';
    if (score >= 6) level = 'Urgent';
    else if (score >= 3) level = 'Priority';

    var plan = [];
    plan.push('Run core panel now: coliform/E. coli, nitrates, pH, hardness.');
    if (checked.indexOf('flood') !== -1) plan.push('Use post-flood workflow immediately and avoid untreated drinking water until results return.');
    if (checked.indexOf('repair') !== -1) plan.push('Retest within 1-2 weeks after repair to confirm system recovery.');
    if (checked.indexOf('taste') !== -1) plan.push('Add metals panel (iron, manganese, arsenic) and sulfur-related checks.');
    if (checked.indexOf('infant') !== -1) plan.push('Prioritize nitrate and lead confirmation with fastest certified lab turnaround.');
    if (checked.indexOf('known') !== -1) plan.push('Re-test prior failure contaminants first, then confirm treatment performance.');
    plan.push('Document results and set a calendar reminder for annual retesting.');

    urgency.textContent = level + ' action level';
    steps.innerHTML = '';
    plan.forEach(function(item) {
      var li = document.createElement('li');
      li.textContent = item;
      steps.appendChild(li);
    });
    result.classList.remove('hidden');
  });
})();

// ── NSF checker tool ────────────────────────────────────────────
(function() {
  var model = document.getElementById('nsf-model');
  var contaminant = document.getElementById('nsf-contaminant');
  var device = document.getElementById('nsf-device');
  var run = document.getElementById('nsf-run');
  var result = document.getElementById('nsf-result');
  if (!model || !contaminant || !device || !run || !result) return;

  var standards = {
    chlorine: ['NSF 42'],
    lead: ['NSF 53', 'NSF 58 (for RO units)'],
    pfas: ['NSF 53', 'NSF 58'],
    nitrates: ['NSF 58'],
    arsenic: ['NSF 58', 'NSF 53 (model-specific)'],
    bacteria: ['NSF 55 Class A (UV)', 'Microbiological claim verification']
  };

  run.addEventListener('click', function() {
    var c = contaminant.value;
    var m = (model.value || '').trim();
    if (!c) {
      result.classList.remove('hidden');
      result.textContent = 'Select a target contaminant to generate a certification path.';
      return;
    }
    var needed = standards[c] || ['Model-specific verification required'];
    var deviceHint = device.value ? ('Device type selected: ' + device.options[device.selectedIndex].text + '.') : 'Device type not selected.';
    var modelHint = m ? ('Search this exact model in NSF: ' + m + '.') : 'No model entered yet, use exact model number from listing.';
    result.innerHTML =
      '<p class="font-semibold mb-1">Recommended certification checks</p>' +
      '<p class="mb-2">' + escapeHtml(needed.join(', ')) + '</p>' +
      '<p class="mb-2">' + escapeHtml(modelHint) + ' ' + escapeHtml(deviceHint) + '</p>' +
      '<p><a class="text-cyan-700 no-underline hover:underline" href="https://info.nsf.org/Certified/DWTU/" target="_blank" rel="noopener noreferrer">Open NSF certified listings</a> | ' +
      '<a class="text-cyan-700 no-underline hover:underline" href="/learn/nsf-certification-standards-explained/">Standards explainer</a></p>';
    result.classList.remove('hidden');
  });
})();

  var contam = document.getElementById('tm-contaminant');
  var goal = document.getElementById('tm-goal');

    Lead: { method: 'NSF 53/58 point-of-use filtration', notes: 'Also investigate plumbing/source contribution.', link: '/treatment/how-to-remove-lead-from-water/' },
    Nitrates: { method: 'Reverse osmosis or distillation', notes: 'Standard carbon is generally not sufficient.', link: '/treatment/how-to-remove-nitrates-from-water/' },
    Arsenic: { method: 'RO or adsorptive media', notes: 'Performance can vary by arsenic speciation and pH.', link: '/treatment/how-to-remove-arsenic-from-water/' },
    'Chromium-6': { method: 'RO plus model-specific adsorptive options', notes: 'Validate Cr(VI)-specific claim language.', link: '/treatment/how-to-remove-chromium-6-from-water/' },
    'THMs/VOCs': { method: 'Activated carbon', notes: 'Focus on disinfection byproduct context and turnover.', link: '/your-water/contaminants/thms/' },
    Hardness: { method: 'Ion-exchange softening', notes: 'Scale control and appliance protection, not full contaminant treatment.', link: '/learn/arizona-hard-water-treatment/' },
    Bacteria: { method: 'Disinfection + source correction', notes: 'UV/chlorination plus root-cause remediation.', link: '/your-water/contaminants/bacteria/' }

    var rec = matrix[c];
    result.innerHTML =
      '<p class="font-semibold mb-1">Recommended approach for ' + escapeHtml(c) + '</p>' +
      '<p class="mb-1">' + escapeHtml(rec.method) + '</p>' +
      '<p class="mb-2">' + escapeHtml(rec.notes) + '</p>' +
      '<p class="mb-2">' + escapeHtml(goalText) + '</p>' +
      '<p><a class="text-cyan-700 no-underline hover:underline" href="' + rec.link + '">Open detailed guide</a></p>';
    result.classList.remove('hidden');
  });
})();

// ── Article TOC with scroll spy ──────────────────────────────────
(function() {
  var container = document.getElementById('article-toc');
  if (!container) return;
  var article = document.querySelector('article.prose');
  if (!article) return;
  var headings = article.querySelectorAll('h2, h3');
  if (headings.length < 3) { container.style.display = 'none'; return; }

  // Assign IDs to headings that lack them
  headings.forEach(function(h, i) {
    if (!h.id) {
      h.id = 'section-' + i;
    }
  });

  // Build the TOC
  var label = document.createElement('p');
  label.className = 'toc-heading';
  label.textContent = 'On This Page';

  var ol = document.createElement('ol');
  ol.className = 'toc-list';

  headings.forEach(function(h) {
    var li = document.createElement('li');
    li.className = h.tagName === 'H3' ? 'toc-h3' : 'toc-h2';
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'toc-link';
    a.dataset.target = h.id;
    li.appendChild(a);
    ol.appendChild(li);
  });

  container.appendChild(label);
  container.appendChild(ol);

  // Scroll spy via IntersectionObserver
  if (!('IntersectionObserver' in window)) return;
  var links = ol.querySelectorAll('.toc-link');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        links.forEach(function(l) { l.classList.remove('toc-active'); });
        var active = ol.querySelector('[data-target="' + entry.target.id + '"]');
        if (active) active.classList.add('toc-active');
      }
    });
  }, { rootMargin: '-15% 0px -70% 0px' });

  headings.forEach(function(h) { observer.observe(h); });
})();

// ── Scroll reveal ────────────────────────────────────────────────
(function() {
  var els = document.querySelectorAll('.reveal');
  if (!els.length) return;
  if (!('IntersectionObserver' in window)) {
    els.forEach(function(el) { el.classList.add('is-visible'); });
    return;
  }
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.07 });
  els.forEach(function(el) { observer.observe(el); });
})();
